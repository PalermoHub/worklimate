name: Aggiorna mappa rischio caldo

on:
  schedule:
    - cron: "0 5 * * *"   # ogni giorno alle 05:00 UTC (~07:00 ora italiana)
  workflow_dispatch: {}    # per lanciarlo anche a mano da Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Aggiorna data/rischio.geojson
        run: node scripts/fetch-risk.mjs

      - name: Commit se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rischio.geojson
          git diff --cached --quiet || git commit -m "Aggiorna rischio caldo $(date -u +%Y-%m-%d)"
          git push
