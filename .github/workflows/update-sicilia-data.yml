name: Aggiorna rischio da caldo Sicilia

on:
  schedule:
    # 05:30 UTC = 07:30 CEST — prima della fascia di rischio 12-16
    - cron: '30 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-sicilia-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Aggiorna dati rischio (index.html)
        run: node scripts/update-data.mjs

      - name: Commit e push se cambiato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- index.html data/storico-rischio.csv; then
            echo "Nessuna modifica, skip commit."
            exit 0
          fi
          git add index.html data/storico-rischio.csv
          git commit -m "Aggiorna rischio da caldo Sicilia $(date -u +%Y-%m-%d)"
          git push
