name: Aggiorna rischio da caldo Sicilia

on:
  schedule:
    # 05:30 UTC = 07:30 CEST (ora legale, mar-ott) — prima della fascia di rischio 12-16
    - cron: '30 4 * * *'
    # 06:30 UTC = 07:30 CET (ora solare, nov-mar)
    - cron: '30 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-sicilia-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verifica orario italiano previsto (7:30, gestisce CET/CEST)
        id: check-ora
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ora=$(TZ=Europe/Rome date +%H)
          if [ "$ora" = "07" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Ora locale Italia: $ora, non 07. Skip run." >&2
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check-ora.outputs.run == 'true'
        with:
          node-version: 20

      - name: Aggiorna dati rischio (data/rischio-oggi.json)
        if: steps.check-ora.outputs.run == 'true'
        run: node scripts/update-data.mjs

      - name: Commit e push se cambiato
        if: steps.check-ora.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/rischio-oggi.json data/storico-rischio.csv; then
            echo "Nessuna modifica, skip commit."
            exit 0
          fi
          git add data/rischio-oggi.json data/storico-rischio.csv
          git commit -m "Aggiorna rischio da caldo Sicilia $(date -u +%Y-%m-%d)"
          git push
