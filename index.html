<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rischio da caldo · Worklimate</title>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" integrity="sha384-p5cy4wHtKSqjnLUNjQ+8ffCwUp0vlLS+6lg1lc3qqXax2E1EmVCMCAimU+R0MOZH" crossorigin="anonymous" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js" integrity="sha384-3WUbXI7T+/GIrWP/5MDMjhzLyHQ+0utF3PnJ7ozD7UeN1/bbZ96Hk+Vvd024VYfW" crossorigin="anonymous"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js" integrity="sha384-MjejsnWXHmuz93aE35YWLh5AbS/6ceRB3Vb+ukOwqFzJRTpQ8vvbkLbNV7I0QK4f" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="css/worklimate.css" rel="stylesheet" />
    <link rel="shortcut icon" href="img/favicon.ico"/> 
    <link rel="icon" href="favicon.png" type="img/image/png"/> 


</head>
<body>

<div id="map"></div>

<div class="topbar">
  <h1>Rischio da caldo</h1>
  <p>dati Worklimate · CNR</p>
  <div class="day-toggle" id="dayToggle">
    <button data-day="0" class="active">Oggi<span class="day-date" id="date-0"></span></button>
    <button data-day="1">Domani<span class="day-date" id="date-1"></span></button>
    <button data-day="2">Dopodom.<span class="day-date" id="date-2"></span></button>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Livello di rischio <span class="legend-hint">(filtro)</span></div>
  <button class="legend-row active" data-colore="green"><span class="swatch" style="background:var(--green)"></span><span class="legend-label">Nessuno</span><span class="legend-count" id="count-green"></span></button>
  <button class="legend-row active" data-colore="yellow"><span class="swatch" style="background:var(--yellow)"></span><span class="legend-label">Basso</span><span class="legend-count" id="count-yellow"></span></button>
  <button class="legend-row active" data-colore="orange"><span class="swatch" style="background:var(--orange)"></span><span class="legend-label">Moderato</span><span class="legend-count" id="count-orange"></span></button>
  <button class="legend-row active" data-colore="red"><span class="swatch" style="background:var(--red)"></span><span class="legend-label">Alto</span><span class="legend-count" id="count-red"></span></button>
  <div class="legend-divider" id="provinciaDivider" hidden></div>
  <div class="legend-title" id="provinciaTitle" hidden>Provincia <span class="legend-hint">(filtro)</span></div>
  <div class="provincia-list" id="provinciaList"></div>
  <button class="legend-storico-btn" id="storicoBtn" hidden>Storico rischio ↗</button>
</div>

<div class="updated-wrap">
  <a href="https://opendatasicilia.it/" target="_blank" rel="noopener" title="Open Data Sicilia">
    <img src="img/opendatasicilia.png" alt="Open Data Sicilia" class="ods-logo">
  </a>
  <div class="updated" id="updatedAt"></div>
</div>

<div class="storico-overlay" id="storicoOverlay" hidden>
  <div class="storico-modal">
    <div class="storico-header">
      <div>
        <h2>Storico rischio da caldo</h2>
        <p id="storicoSubtitle">data/rischio_storico.csv</p>
      </div>
      <button class="storico-close" id="storicoClose" aria-label="Chiudi">&times;</button>
    </div>
    <div class="storico-toolbar" id="storicoToolbar" hidden>
      <input type="text" id="storicoSearch" placeholder="Cerca comune…" />
      <select id="storicoFiltroColore"><option value="">Rischio: tutti</option></select>
      <select id="storicoFiltroProvincia"><option value="">Provincia: tutte</option></select>
      <select id="storicoFiltroData"><option value="">Data: tutte</option></select>
      <div class="storico-toolbar-actions">
        <button id="storicoClearSelection" hidden>Annulla selezione</button>
        <button id="storicoDownloadCsv">Scarica CSV</button>
        <button id="storicoDownloadJson">Scarica JSON</button>
      </div>
    </div>
    <div class="storico-body" id="storicoBody">
      <div class="storico-empty">Caricamento…</div>
    </div>
  </div>
</div>

<script>
const COLORI = { green:'#4c9a5b', yellow:'#d9a824', orange:'#e07b2b', red:'#c8402f' };

const pmtilesProtocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile);

const SICILIA_BOUNDS = [[11.9, 36.5], [15.7, 38.9]];

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  bounds: SICILIA_BOUNDS,
  fitBoundsOptions: { padding: 24 },
  hash: true,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

let currentDay = 0;
let geojsonData = null;
const popup = new maplibregl.Popup({ closeButton: true, offset: 12 });

const activeColori = new Set(['green', 'yellow', 'orange', 'red']);
const activeProvince = new Set(); // popolato al caricamento dati, solo se ci sono >=2 province
let filtroProvinciaAttivo = false;

function featureForDay(feature, dayIndex) {
  const giorno = feature.properties.giorni_parsed[dayIndex] || feature.properties.giorni_parsed[0];
  return {
    ...feature,
    properties: { ...feature.properties, colore: giorno.colore, label: giorno.label, desc: giorno.desc, data: giorno.data },
  };
}

function updateLegendLabels(features) {
  // Il "label" testuale arriva dall'API Worklimate: non assumiamo una mappatura
  // fissa colore→etichetta (il README ufficiale la documenta, ma i dati live
  // possono discostarsene), usiamo quella osservata nei dati.
  const labelPerColore = {};
  features.forEach((f) => {
    (f.properties.giorni || []).forEach((g) => {
      if (g.colore && g.label && !labelPerColore[g.colore]) labelPerColore[g.colore] = g.label;
    });
  });
  document.querySelectorAll('.legend-row').forEach((btn) => {
    const label = labelPerColore[btn.dataset.colore];
    if (label) btn.querySelector('.legend-label').textContent = label;
  });
}

function populateDayDates(features) {
  const giorni = features[0]?.properties?.giorni;
  if (!giorni) return;
  giorni.forEach((g, i) => {
    const el = document.getElementById(`date-${i}`);
    if (!el || !g.data) return;
    const [y, m, d] = g.data.split('-');
    el.textContent = `${d}/${m}`;
  });
}

function populateProvinciaChips(features) {
  const province = [...new Set(features.map((f) => f.properties.provincia).filter(Boolean))].sort();
  if (province.length < 2) return; // niente da filtrare con un solo valore (o dato assente)
  filtroProvinciaAttivo = true;
  province.forEach((p) => activeProvince.add(p));

  const list = document.getElementById('provinciaList');
  list.innerHTML = '';
  province.forEach((p) => {
    const chip = document.createElement('button');
    chip.className = 'provincia-chip active';
    chip.dataset.provincia = p;
    chip.textContent = p;
    list.appendChild(chip);
  });
  document.getElementById('provinciaDivider').hidden = false;
  document.getElementById('provinciaTitle').hidden = false;
}

function applyFilters() {
  const filter = ['all',
    ['in', ['get', 'colore'], ['literal', [...activeColori]]],
    filtroProvinciaAttivo ? ['in', ['get', 'provincia'], ['literal', [...activeProvince]]] : true,
  ];
  map.setFilter('rischio-circles', filter);

  document.querySelectorAll('.legend-row').forEach((btn) => {
    btn.classList.toggle('active', activeColori.has(btn.dataset.colore));
  });
  document.querySelectorAll('.provincia-chip').forEach((chip) => {
    chip.classList.toggle('active', activeProvince.has(chip.dataset.provincia));
  });

  if (geojsonData) {
    const features = geojsonData.features.map((f) => featureForDay(f, currentDay));
    const visibili = filtroProvinciaAttivo
      ? features.filter((f) => activeProvince.has(f.properties.provincia))
      : features;
    ['green', 'yellow', 'orange', 'red'].forEach((c) => {
      document.getElementById(`count-${c}`).textContent =
        visibili.filter((f) => f.properties.colore === c).length;
    });
  }
}

function render() {
  if (!geojsonData) return;
  const features = geojsonData.features.map((f) => featureForDay(f, currentDay));
  map.getSource('rischio').setData({ type: 'FeatureCollection', features });
  applyFilters();
}

function zoomToFiltered() {
  if (!geojsonData) return;
  const features = geojsonData.features.map((f) => featureForDay(f, currentDay));
  const visibili = features.filter((f) =>
    activeColori.has(f.properties.colore) &&
    (!filtroProvinciaAttivo || activeProvince.has(f.properties.provincia))
  );
  if (!visibili.length) return;
  const bounds = new maplibregl.LngLatBounds();
  visibili.forEach((f) => bounds.extend(f.geometry.coordinates));
  map.fitBounds(bounds, { padding: 60, maxZoom: 11, duration: 600 });
}

map.on('load', async () => {
  map.addSource('comuni-boundaries', {
    type: 'vector',
    url: 'pmtiles://https://gbvitrano.it/anncus/data/comuni.pmtiles',
  });

  map.addLayer({
    id: 'comuni-fill',
    type: 'fill',
    source: 'comuni-boundaries',
    'source-layer': 'comuni',
    filter: ['==', ['get', 'cod_reg'], 19],
    paint: { 'fill-color': '#1c2321', 'fill-opacity': 0.03 },
  });
  map.addLayer({
    id: 'comuni-outline',
    type: 'line',
    source: 'comuni-boundaries',
    'source-layer': 'comuni',
    filter: ['==', ['get', 'cod_reg'], 19],
    paint: { 'line-color': '#1c2321', 'line-width': 0.6, 'line-opacity': 0.25 },
  });

  map.addSource('rischio', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  map.addLayer({
    id: 'rischio-circles',
    type: 'circle',
    source: 'rischio',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 5, 6, 10, 16],
      'circle-color': ['match', ['get', 'colore'], 'green', COLORI.green, 'yellow', COLORI.yellow, 'orange', COLORI.orange, 'red', COLORI.red, '#999'],
      'circle-stroke-width': 2,
      'circle-stroke-color': '#ffffff',
    },
  });

  try {
    const res = await fetch('data/rischio.geojson');
    const raw = await res.json();

    // pre-parsa i 3 giorni (già presenti in properties.giorni dallo script)
    raw.features.forEach((f) => {
      f.properties.giorni_parsed = f.properties.giorni;
    });

    geojsonData = raw;
    document.getElementById('updatedAt').textContent =
      'aggiornato ' + new Date(raw.generated_at).toLocaleString('it-IT');
    updateLegendLabels(raw.features);
    populateDayDates(raw.features);
    populateProvinciaChips(raw.features);
    render();
  } catch (err) {
    document.getElementById('updatedAt').textContent = 'dati non disponibili';
    console.error(err);
  }

  map.on('click', 'rischio-circles', (e) => {
    const p = e.features[0].properties;
    const colore = COLORI[p.colore] || '#999';
    popup
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`
        <div class="popup-title">${p.nome}</div>
        <div class="popup-badge" style="background:${colore}">${p.label}</div>
        <div class="popup-desc">${p.desc || ''}</div>
      `)
      .addTo(map);
  });

  map.on('mouseenter', 'rischio-circles', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'rischio-circles', () => { map.getCanvas().style.cursor = ''; });
});

document.getElementById('dayToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.day-toggle button').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
  currentDay = Number(btn.dataset.day);
  render();
});

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else if (c === '"') { inQuotes = true; }
    else if (c === ',') { row.push(field); field = ''; }
    else if (c === '\n' || c === '\r') {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field); field = '';
      if (row.length > 1 || row[0] !== '') rows.push(row);
      row = [];
    } else { field += c; }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  if (!rows.length) return [];
  const header = rows[0];
  return rows.slice(1).map((r) => Object.fromEntries(header.map((h, i) => [h, r[i] ?? ''])));
}

const STORICO_COLONNE = ['data', 'codice_istat', 'comune', 'provincia', 'colore', 'label', 'desc', 'pgrid'];

let storicoLoaded = false;
let storicoRows = [];       // tutte le righe, con _key aggiunta
let storicoFiltered = [];   // righe visibili dopo i filtri correnti
const storicoSelected = new Set(); // _key delle righe selezionate

function storicoKey(r) { return `${r.data}|${r.codice_istat}`; }

function csvEscape(value) {
  const s = String(value ?? '');
  return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

function rowsToCSV(rows) {
  const header = STORICO_COLONNE.join(',');
  const lines = rows.map((r) => STORICO_COLONNE.map((c) => csvEscape(r[c])).join(','));
  return [header, ...lines].join('\n') + '\n';
}

function rowsToJSON(rows) {
  return JSON.stringify(
    rows.map((r) => Object.fromEntries(STORICO_COLONNE.map((c) => [c, r[c]]))),
    null,
    2
  );
}

function triggerDownload(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function rowsPerDownload() {
  // se c'è una selezione attiva scarica solo quella, altrimenti tutte le righe filtrate
  return storicoSelected.size
    ? storicoRows.filter((r) => storicoSelected.has(r._key))
    : storicoFiltered;
}

function populateStoricoFilterOptions(rows) {
  const coloreSel = document.getElementById('storicoFiltroColore');
  const provinciaSel = document.getElementById('storicoFiltroProvincia');
  const dataSel = document.getElementById('storicoFiltroData');

  const coloreLabel = { green: 'Nessuno', yellow: 'Basso', orange: 'Moderato', red: 'Alto' };
  coloreSel.innerHTML = '<option value="">Rischio: tutti</option>' +
    [...new Set(rows.map((r) => r.colore))].filter(Boolean).sort()
      .map((c) => `<option value="${c}">${coloreLabel[c] || c}</option>`).join('');

  const province = [...new Set(rows.map((r) => r.provincia))].filter(Boolean).sort();
  provinciaSel.innerHTML = '<option value="">Provincia: tutte</option>' +
    province.map((p) => `<option value="${p}">${p}</option>`).join('');

  const date = [...new Set(rows.map((r) => r.data))].filter(Boolean).sort().reverse();
  dataSel.innerHTML = '<option value="">Data: tutte</option>' +
    date.map((d) => `<option value="${d}">${d}</option>`).join('');
}

function renderStoricoTable() {
  const body = document.getElementById('storicoBody');
  const search = document.getElementById('storicoSearch').value.trim().toLowerCase();
  const fColore = document.getElementById('storicoFiltroColore').value;
  const fProvincia = document.getElementById('storicoFiltroProvincia').value;
  const fData = document.getElementById('storicoFiltroData').value;

  storicoFiltered = storicoRows.filter((r) =>
    (!search || r.comune.toLowerCase().includes(search)) &&
    (!fColore || r.colore === fColore) &&
    (!fProvincia || r.provincia === fProvincia) &&
    (!fData || r.data === fData)
  );

  document.getElementById('storicoSubtitle').textContent =
    `${storicoFiltered.length}/${storicoRows.length} righe · data/rischio_storico.csv`;

  if (!storicoFiltered.length) {
    body.innerHTML = '<div class="storico-empty">Nessuna riga corrisponde ai filtri.</div>';
  } else {
    const allSelected = storicoFiltered.every((r) => storicoSelected.has(r._key));
    const trs = storicoFiltered.map((r) => {
      const colore = COLORI[r.colore] || '#999';
      const checked = storicoSelected.has(r._key) ? 'checked' : '';
      return `<tr>
        <td class="check-cell"><input type="checkbox" class="storico-row-check" data-key="${r._key}" ${checked}></td>
        <td>${r.data}</td>
        <td>${r.codice_istat}</td>
        <td>${r.comune}</td>
        <td>${r.provincia}</td>
        <td><span class="storico-badge" style="background:${colore}">${r.label}</span></td>
        <td class="desc-cell">${r.desc}</td>
        <td>${r.pgrid}</td>
      </tr>`;
    }).join('');
    body.innerHTML = `<table class="storico-table">
      <thead><tr>
        <th class="check-cell"><input type="checkbox" id="storicoSelectAll" ${allSelected ? 'checked' : ''}></th>
        <th>Data</th><th>Cod. ISTAT</th><th>Comune</th><th>Prov.</th><th>Rischio</th><th>Descrizione</th><th>Pgrid</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
  }

  updateStoricoActions();
}

function updateStoricoActions() {
  const n = rowsPerDownload().length;
  document.getElementById('storicoDownloadCsv').textContent = `Scarica CSV (${n})`;
  document.getElementById('storicoDownloadJson').textContent = `Scarica JSON (${n})`;
  document.getElementById('storicoClearSelection').hidden = storicoSelected.size === 0;
}

async function loadStorico() {
  const body = document.getElementById('storicoBody');
  try {
    const res = await fetch('data/rischio_storico.csv');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    rows.forEach((r) => { r._key = storicoKey(r); });
    rows.sort((a, b) => (b.data + b.comune).localeCompare(a.data + a.comune));
    storicoRows = rows;
    if (!rows.length) {
      document.getElementById('storicoToolbar').hidden = true;
      body.innerHTML = '<div class="storico-empty">Nessun dato storico ancora disponibile.</div>';
      return;
    }
    populateStoricoFilterOptions(rows);
    document.getElementById('storicoToolbar').hidden = false;
    renderStoricoTable();
    storicoLoaded = true;
  } catch (err) {
    body.innerHTML = '<div class="storico-empty">Storico non disponibile.</div>';
    console.error(err);
  }
}

const storicoOverlay = document.getElementById('storicoOverlay');
document.getElementById('storicoBtn').addEventListener('click', () => {
  storicoOverlay.hidden = false;
  if (!storicoLoaded) loadStorico();
});
document.getElementById('storicoClose').addEventListener('click', () => { storicoOverlay.hidden = true; });
storicoOverlay.addEventListener('click', (e) => { if (e.target === storicoOverlay) storicoOverlay.hidden = true; });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') storicoOverlay.hidden = true; });

['storicoSearch', 'storicoFiltroColore', 'storicoFiltroProvincia', 'storicoFiltroData'].forEach((id) => {
  document.getElementById(id).addEventListener('input', renderStoricoTable);
});

document.getElementById('storicoBody').addEventListener('change', (e) => {
  if (e.target.id === 'storicoSelectAll') {
    if (e.target.checked) storicoFiltered.forEach((r) => storicoSelected.add(r._key));
    else storicoFiltered.forEach((r) => storicoSelected.delete(r._key));
    renderStoricoTable();
    return;
  }
  if (e.target.classList.contains('storico-row-check')) {
    const key = e.target.dataset.key;
    if (e.target.checked) storicoSelected.add(key); else storicoSelected.delete(key);
    updateStoricoActions();
    const selectAll = document.getElementById('storicoSelectAll');
    if (selectAll) selectAll.checked = storicoFiltered.every((r) => storicoSelected.has(r._key));
  }
});

document.getElementById('storicoClearSelection').addEventListener('click', () => {
  storicoSelected.clear();
  renderStoricoTable();
});

document.getElementById('storicoDownloadCsv').addEventListener('click', () => {
  const rows = rowsPerDownload();
  if (!rows.length) return;
  triggerDownload('rischio_storico.csv', rowsToCSV(rows), 'text/csv;charset=utf-8');
});

document.getElementById('storicoDownloadJson').addEventListener('click', () => {
  const rows = rowsPerDownload();
  if (!rows.length) return;
  triggerDownload('rischio_storico.json', rowsToJSON(rows), 'application/json;charset=utf-8');
});

document.querySelector('.legend').addEventListener('click', (e) => {
  const row = e.target.closest('.legend-row');
  if (row) {
    const colore = row.dataset.colore;
    if (activeColori.size === 1 && activeColori.has(colore)) {
      // riclicco l'unico livello isolato: torno a mostrare tutti i livelli
      document.querySelectorAll('.legend-row').forEach((r) => activeColori.add(r.dataset.colore));
    } else {
      // isola solo il livello cliccato
      activeColori.clear();
      activeColori.add(colore);
    }
    applyFilters();
    zoomToFiltered();
    return;
  }
  const chip = e.target.closest('.provincia-chip');
  if (chip) {
    const p = chip.dataset.provincia;
    if (activeProvince.size === 1 && activeProvince.has(p)) {
      // riclicco l'unica provincia isolata: torno a mostrare tutte le province
      document.querySelectorAll('.provincia-chip').forEach((c) => activeProvince.add(c.dataset.provincia));
    } else {
      // isola solo la provincia cliccata
      activeProvince.clear();
      activeProvince.add(p);
    }
    applyFilters();
    zoomToFiltered();
  }
});
</script>

</body>
</html>
