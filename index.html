<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rischio da caldo · Worklimate</title>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" integrity="sha384-p5cy4wHtKSqjnLUNjQ+8ffCwUp0vlLS+6lg1lc3qqXax2E1EmVCMCAimU+R0MOZH" crossorigin="anonymous" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js" integrity="sha384-3WUbXI7T+/GIrWP/5MDMjhzLyHQ+0utF3PnJ7ozD7UeN1/bbZ96Hk+Vvd024VYfW" crossorigin="anonymous"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js" integrity="sha384-MjejsnWXHmuz93aE35YWLh5AbS/6ceRB3Vb+ukOwqFzJRTpQ8vvbkLbNV7I0QK4f" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2321;
    --paper:#f7f6f2;
    --panel:#ffffff;
    --line:#dedad2;
    --muted:#6b6f6c;
    --green:#4c9a5b;
    --yellow:#d9a824;
    --orange:#e07b2b;
    --red:#c8402f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);}
  #map{position:absolute;inset:0;}

  .topbar{
    position:absolute; top:16px; left:16px; z-index:5;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; box-shadow:0 4px 16px rgba(28,35,33,.08);
    max-width:280px;
  }
  .topbar h1{
    font-size:15px; font-weight:700; margin:0 0 2px;
    letter-spacing:.01em;
  }
  .topbar p{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
    margin:0 0 12px; letter-spacing:.02em;
  }

  .day-toggle{ display:flex; gap:4px; }
  .day-toggle button{
    flex:1; padding:7px 6px; font-family:'IBM Plex Mono',monospace; font-size:11px;
    border:1px solid var(--line); background:var(--paper); color:var(--ink);
    border-radius:6px; cursor:pointer; transition:background .15s, color .15s;
  }
  .day-toggle button:hover{ background:#efece4; }
  .day-toggle button.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .day-date{
    display:block; font-size:10px; opacity:.65; margin-top:2px;
  }

  .legend{
    position:absolute; bottom:20px; left:16px; z-index:5;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; box-shadow:0 4px 16px rgba(28,35,33,.08);
    font-size:12px; max-width:220px;
  }
  .legend-title{ font-weight:600; margin-bottom:8px; }
  .legend-hint{ font-weight:400; color:var(--muted); font-size:10.5px; }
  .legend-row{
    display:flex; align-items:center; gap:8px; margin-bottom:5px;
    width:100%; border:none; background:none; padding:3px 4px; border-radius:6px;
    font-family:'Inter',system-ui,sans-serif; font-size:12px; color:var(--ink);
    cursor:pointer; opacity:.35; transition:opacity .15s, background .15s;
  }
  .legend-row:hover{ background:#efece4; }
  .legend-row.active{ opacity:1; }
  .legend-row:last-of-type{ margin-bottom:0; }
  .swatch{ width:11px; height:11px; border-radius:50%; flex:none; }
  .legend-label{ flex:1; text-align:left; }
  .legend-count{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted);
  }

  .legend-divider{ height:1px; background:var(--line); margin:10px 0; }
  .provincia-list{ display:flex; flex-wrap:wrap; gap:4px; }
  .provincia-chip{
    padding:4px 8px; font-family:'IBM Plex Mono',monospace; font-size:10.5px;
    border:1px solid var(--line); background:var(--paper); color:var(--ink);
    border-radius:20px; cursor:pointer; opacity:.4; transition:opacity .15s, background .15s;
  }
  .provincia-chip:hover{ background:#efece4; }
  .provincia-chip.active{ opacity:1; background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .updated{
    position:absolute; bottom:20px; right:16px; z-index:5;
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted);
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:6px 10px;
  }

  .maplibregl-popup-content{
    font-family:'Inter',system-ui,sans-serif; border-radius:10px; padding:14px 16px;
    box-shadow:0 6px 20px rgba(28,35,33,.15);
  }
  .popup-title{ font-weight:700; font-size:14px; margin-bottom:6px; }
  .popup-badge{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px;
    padding:2px 8px; border-radius:20px; color:#fff; margin-bottom:8px;
  }
  .popup-desc{ font-size:12.5px; color:var(--muted); line-height:1.4; }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <h1>Rischio da caldo</h1>
  <p>dati Worklimate · CNR</p>
  <div class="day-toggle" id="dayToggle">
    <button data-day="0" class="active">Oggi<span class="day-date" id="date-0"></span></button>
    <button data-day="1">Domani<span class="day-date" id="date-1"></span></button>
    <button data-day="2">Dopodom.<span class="day-date" id="date-2"></span></button>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Livello di rischio <span class="legend-hint">(filtro)</span></div>
  <button class="legend-row active" data-colore="green"><span class="swatch" style="background:var(--green)"></span><span class="legend-label">Nessuno</span><span class="legend-count" id="count-green"></span></button>
  <button class="legend-row active" data-colore="yellow"><span class="swatch" style="background:var(--yellow)"></span><span class="legend-label">Basso</span><span class="legend-count" id="count-yellow"></span></button>
  <button class="legend-row active" data-colore="orange"><span class="swatch" style="background:var(--orange)"></span><span class="legend-label">Moderato</span><span class="legend-count" id="count-orange"></span></button>
  <button class="legend-row active" data-colore="red"><span class="swatch" style="background:var(--red)"></span><span class="legend-label">Alto</span><span class="legend-count" id="count-red"></span></button>
  <div class="legend-divider" id="provinciaDivider" hidden></div>
  <div class="legend-title" id="provinciaTitle" hidden>Provincia <span class="legend-hint">(filtro)</span></div>
  <div class="provincia-list" id="provinciaList"></div>
</div>

<div class="updated" id="updatedAt"></div>

<script>
const COLORI = { green:'#4c9a5b', yellow:'#d9a824', orange:'#e07b2b', red:'#c8402f' };

const pmtilesProtocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile);

const SICILIA_BOUNDS = [[11.9, 36.5], [15.7, 38.9]];

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  bounds: SICILIA_BOUNDS,
  fitBoundsOptions: { padding: 24 },
  hash: true,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

let currentDay = 0;
let geojsonData = null;
const popup = new maplibregl.Popup({ closeButton: true, offset: 12 });

const activeColori = new Set(['green', 'yellow', 'orange', 'red']);
const activeProvince = new Set(); // popolato al caricamento dati, solo se ci sono >=2 province
let filtroProvinciaAttivo = false;

function featureForDay(feature, dayIndex) {
  const giorno = feature.properties.giorni_parsed[dayIndex] || feature.properties.giorni_parsed[0];
  return {
    ...feature,
    properties: { ...feature.properties, colore: giorno.colore, label: giorno.label, desc: giorno.desc, data: giorno.data },
  };
}

function updateLegendLabels(features) {
  // Il "label" testuale arriva dall'API Worklimate: non assumiamo una mappatura
  // fissa colore→etichetta (il README ufficiale la documenta, ma i dati live
  // possono discostarsene), usiamo quella osservata nei dati.
  const labelPerColore = {};
  features.forEach((f) => {
    (f.properties.giorni || []).forEach((g) => {
      if (g.colore && g.label && !labelPerColore[g.colore]) labelPerColore[g.colore] = g.label;
    });
  });
  document.querySelectorAll('.legend-row').forEach((btn) => {
    const label = labelPerColore[btn.dataset.colore];
    if (label) btn.querySelector('.legend-label').textContent = label;
  });
}

function populateDayDates(features) {
  const giorni = features[0]?.properties?.giorni;
  if (!giorni) return;
  giorni.forEach((g, i) => {
    const el = document.getElementById(`date-${i}`);
    if (!el || !g.data) return;
    const [y, m, d] = g.data.split('-');
    el.textContent = `${d}/${m}`;
  });
}

function populateProvinciaChips(features) {
  const province = [...new Set(features.map((f) => f.properties.provincia).filter(Boolean))].sort();
  if (province.length < 2) return; // niente da filtrare con un solo valore (o dato assente)
  filtroProvinciaAttivo = true;
  province.forEach((p) => activeProvince.add(p));

  const list = document.getElementById('provinciaList');
  list.innerHTML = '';
  province.forEach((p) => {
    const chip = document.createElement('button');
    chip.className = 'provincia-chip active';
    chip.dataset.provincia = p;
    chip.textContent = p;
    list.appendChild(chip);
  });
  document.getElementById('provinciaDivider').hidden = false;
  document.getElementById('provinciaTitle').hidden = false;
}

function applyFilters() {
  const filter = ['all',
    ['in', ['get', 'colore'], ['literal', [...activeColori]]],
    filtroProvinciaAttivo ? ['in', ['get', 'provincia'], ['literal', [...activeProvince]]] : true,
  ];
  map.setFilter('rischio-circles', filter);

  document.querySelectorAll('.legend-row').forEach((btn) => {
    btn.classList.toggle('active', activeColori.has(btn.dataset.colore));
  });
  document.querySelectorAll('.provincia-chip').forEach((chip) => {
    chip.classList.toggle('active', activeProvince.has(chip.dataset.provincia));
  });

  if (geojsonData) {
    const features = geojsonData.features.map((f) => featureForDay(f, currentDay));
    const visibili = filtroProvinciaAttivo
      ? features.filter((f) => activeProvince.has(f.properties.provincia))
      : features;
    ['green', 'yellow', 'orange', 'red'].forEach((c) => {
      document.getElementById(`count-${c}`).textContent =
        visibili.filter((f) => f.properties.colore === c).length;
    });
  }
}

function render() {
  if (!geojsonData) return;
  const features = geojsonData.features.map((f) => featureForDay(f, currentDay));
  map.getSource('rischio').setData({ type: 'FeatureCollection', features });
  applyFilters();
}

function zoomToFiltered() {
  if (!geojsonData) return;
  const features = geojsonData.features.map((f) => featureForDay(f, currentDay));
  const visibili = features.filter((f) =>
    activeColori.has(f.properties.colore) &&
    (!filtroProvinciaAttivo || activeProvince.has(f.properties.provincia))
  );
  if (!visibili.length) return;
  const bounds = new maplibregl.LngLatBounds();
  visibili.forEach((f) => bounds.extend(f.geometry.coordinates));
  map.fitBounds(bounds, { padding: 60, maxZoom: 11, duration: 600 });
}

map.on('load', async () => {
  map.addSource('comuni-boundaries', {
    type: 'vector',
    url: 'pmtiles://https://gbvitrano.it/anncus/data/comuni.pmtiles',
  });

  map.addLayer({
    id: 'comuni-fill',
    type: 'fill',
    source: 'comuni-boundaries',
    'source-layer': 'comuni',
    filter: ['==', ['get', 'cod_reg'], 19],
    paint: { 'fill-color': '#1c2321', 'fill-opacity': 0.03 },
  });
  map.addLayer({
    id: 'comuni-outline',
    type: 'line',
    source: 'comuni-boundaries',
    'source-layer': 'comuni',
    filter: ['==', ['get', 'cod_reg'], 19],
    paint: { 'line-color': '#1c2321', 'line-width': 0.6, 'line-opacity': 0.25 },
  });

  map.addSource('rischio', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  map.addLayer({
    id: 'rischio-circles',
    type: 'circle',
    source: 'rischio',
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 5, 6, 10, 16],
      'circle-color': ['match', ['get', 'colore'], 'green', COLORI.green, 'yellow', COLORI.yellow, 'orange', COLORI.orange, 'red', COLORI.red, '#999'],
      'circle-stroke-width': 2,
      'circle-stroke-color': '#ffffff',
    },
  });

  try {
    const res = await fetch('data/rischio.geojson');
    const raw = await res.json();

    // pre-parsa i 3 giorni (già presenti in properties.giorni dallo script)
    raw.features.forEach((f) => {
      f.properties.giorni_parsed = f.properties.giorni;
    });

    geojsonData = raw;
    document.getElementById('updatedAt').textContent =
      'aggiornato ' + new Date(raw.generated_at).toLocaleString('it-IT');
    updateLegendLabels(raw.features);
    populateDayDates(raw.features);
    populateProvinciaChips(raw.features);
    render();
  } catch (err) {
    document.getElementById('updatedAt').textContent = 'dati non disponibili';
    console.error(err);
  }

  map.on('click', 'rischio-circles', (e) => {
    const p = e.features[0].properties;
    const colore = COLORI[p.colore] || '#999';
    popup
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`
        <div class="popup-title">${p.nome}</div>
        <div class="popup-badge" style="background:${colore}">${p.label}</div>
        <div class="popup-desc">${p.desc || ''}</div>
      `)
      .addTo(map);
  });

  map.on('mouseenter', 'rischio-circles', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'rischio-circles', () => { map.getCanvas().style.cursor = ''; });
});

document.getElementById('dayToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.day-toggle button').forEach((b) => b.classList.remove('active'));
  btn.classList.add('active');
  currentDay = Number(btn.dataset.day);
  render();
});

document.querySelector('.legend').addEventListener('click', (e) => {
  const row = e.target.closest('.legend-row');
  if (row) {
    const colore = row.dataset.colore;
    if (activeColori.size === 1 && activeColori.has(colore)) {
      // riclicco l'unico livello isolato: torno a mostrare tutti i livelli
      document.querySelectorAll('.legend-row').forEach((r) => activeColori.add(r.dataset.colore));
    } else {
      // isola solo il livello cliccato
      activeColori.clear();
      activeColori.add(colore);
    }
    applyFilters();
    zoomToFiltered();
    return;
  }
  const chip = e.target.closest('.provincia-chip');
  if (chip) {
    const p = chip.dataset.provincia;
    if (activeProvince.size === 1 && activeProvince.has(p)) {
      // riclicco l'unica provincia isolata: torno a mostrare tutte le province
      document.querySelectorAll('.provincia-chip').forEach((c) => activeProvince.add(c.dataset.provincia));
    } else {
      // isola solo la provincia cliccata
      activeProvince.clear();
      activeProvince.add(p);
    }
    applyFilters();
    zoomToFiltered();
  }
});
</script>

</body>
</html>
